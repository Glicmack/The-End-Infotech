<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3D AI Head</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from 'three';

// Scene setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0.1, 3.2);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
document.body.appendChild(renderer.domElement);

// Lighting - dramatic with rim lights to define the silhouette
const ambientLight = new THREE.AmbientLight(0x1a1a2e, 0.8);
scene.add(ambientLight);

// Key light from top-right
const keyLight = new THREE.DirectionalLight(0x667799, 1.2);
keyLight.position.set(3, 4, 3);
scene.add(keyLight);

// Strong rim light from behind-left to define silhouette
const rimLight = new THREE.DirectionalLight(0x334466, 2.0);
rimLight.position.set(-3, 2, -3);
scene.add(rimLight);

// Rim light from behind-right
const rimLight2 = new THREE.DirectionalLight(0x223344, 1.5);
rimLight2.position.set(3, 1, -2);
scene.add(rimLight2);

// Top light for forehead definition
const topLight = new THREE.DirectionalLight(0x445566, 1.0);
topLight.position.set(0, 5, 1);
scene.add(topLight);

// Cyan visor glow light - strong
const visorLight = new THREE.PointLight(0x66ffee, 4.0, 6);
visorLight.position.set(0, 0.45, 1.2);
scene.add(visorLight);

const visorLight2 = new THREE.PointLight(0x44ddcc, 1.5, 3);
visorLight2.position.set(0, 0.45, 0.8);
scene.add(visorLight2);

// Dark material for the head - slightly reflective to catch rim lights
const headMaterial = new THREE.MeshStandardMaterial({
    color: 0x151520,
    roughness: 0.4,
    metalness: 0.8,
});

// Glowing visor material
const visorMaterial = new THREE.MeshStandardMaterial({
    color: 0x88ffee,
    emissive: 0x44ddcc,
    emissiveIntensity: 2.5,
    roughness: 0.1,
    metalness: 0.8,
    transparent: true,
    opacity: 0.9,
});

// Build a stylized head from primitives
const headGroup = new THREE.Group();

// Skull - slightly elongated sphere
const skullGeo = new THREE.SphereGeometry(0.75, 64, 48);
// Flatten the bottom and elongate vertically
const skullPositions = skullGeo.attributes.position;
for (let i = 0; i < skullPositions.count; i++) {
    let x = skullPositions.getX(i);
    let y = skullPositions.getY(i);
    let z = skullPositions.getZ(i);

    // Elongate vertically
    y *= 1.15;

    // Narrow the jaw area
    if (y < -0.2) {
        const jawFactor = 1 - Math.pow(Math.abs(y + 0.2) / 0.7, 0.7) * 0.4;
        x *= jawFactor;
        z *= jawFactor * 0.9;
    }

    // Slight forehead protrusion
    if (y > 0.3 && z > 0) {
        z += Math.pow((y - 0.3) / 0.5, 2) * 0.08;
    }

    // Cheekbone definition
    if (y > -0.15 && y < 0.2 && z > 0) {
        const cheekFactor = Math.sin((y + 0.15) / 0.35 * Math.PI) * 0.06;
        x *= 1 + cheekFactor * Math.abs(x);
    }

    // Flatten back of head slightly
    if (z < -0.3) {
        z *= 0.88;
    }

    skullPositions.setXYZ(i, x, y, z);
}
skullGeo.computeVertexNormals();
const skull = new THREE.Mesh(skullGeo, headMaterial);
headGroup.add(skull);

// Nose bridge
const noseGeo = new THREE.CylinderGeometry(0.04, 0.06, 0.35, 8);
const nose = new THREE.Mesh(noseGeo, headMaterial);
nose.position.set(0, -0.05, 0.7);
nose.rotation.x = -0.15;
headGroup.add(nose);

// Nose tip
const noseTipGeo = new THREE.SphereGeometry(0.07, 16, 12);
const noseTip = new THREE.Mesh(noseTipGeo, headMaterial);
noseTip.position.set(0, -0.2, 0.73);
noseTip.scale.set(1, 0.7, 0.8);
headGroup.add(noseTip);

// Brow ridge
const browGeo = new THREE.TorusGeometry(0.42, 0.05, 8, 32, Math.PI);
const brow = new THREE.Mesh(browGeo, headMaterial);
brow.position.set(0, 0.22, 0.5);
brow.rotation.x = -0.3;
brow.rotation.z = Math.PI;
headGroup.add(brow);

// Eye sockets (indentations)
const eyeSocketGeo = new THREE.SphereGeometry(0.14, 16, 12);
const eyeSocketMat = new THREE.MeshStandardMaterial({
    color: 0x050508,
    roughness: 0.8,
    metalness: 0.3,
});
const leftEyeSocket = new THREE.Mesh(eyeSocketGeo, eyeSocketMat);
leftEyeSocket.position.set(-0.22, 0.12, 0.6);
leftEyeSocket.scale.set(1.1, 0.7, 0.5);
headGroup.add(leftEyeSocket);

const rightEyeSocket = leftEyeSocket.clone();
rightEyeSocket.position.set(0.22, 0.12, 0.6);
headGroup.add(rightEyeSocket);

// Visor - the glowing cyan band across the eyes
const visorGeo = new THREE.BoxGeometry(0.85, 0.045, 0.12);
// Round the edges
const visorMesh = new THREE.Mesh(visorGeo, visorMaterial);
visorMesh.position.set(0, 0.15, 0.68);
// Make it slightly curved
const visorCurveGeo = new THREE.TorusGeometry(0.55, 0.025, 8, 64, Math.PI * 0.55);
const visorCurve = new THREE.Mesh(visorCurveGeo, visorMaterial);
visorCurve.position.set(0, 0.15, 0.25);
visorCurve.rotation.y = Math.PI;
visorCurve.rotation.x = Math.PI / 2;
visorCurve.rotation.z = Math.PI * 0.725;
headGroup.add(visorCurve);

// Visor glow plane (additive glow effect)
const glowGeo = new THREE.PlaneGeometry(1.0, 0.08);
const glowMat = new THREE.MeshBasicMaterial({
    color: 0x66ffee,
    transparent: true,
    opacity: 0.15,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
});
const glow = new THREE.Mesh(glowGeo, glowMat);
glow.position.set(0, 0.15, 0.72);
headGroup.add(glow);

// Larger glow halo
const haloGeo = new THREE.PlaneGeometry(1.4, 0.2);
const haloMat = new THREE.MeshBasicMaterial({
    color: 0x44ddcc,
    transparent: true,
    opacity: 0.06,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
});
const halo = new THREE.Mesh(haloGeo, haloMat);
halo.position.set(0, 0.15, 0.71);
headGroup.add(halo);

// Chin
const chinGeo = new THREE.SphereGeometry(0.12, 16, 12);
const chin = new THREE.Mesh(chinGeo, headMaterial);
chin.position.set(0, -0.62, 0.42);
chin.scale.set(1, 0.6, 0.7);
headGroup.add(chin);

// Ears
const earGeo = new THREE.SphereGeometry(0.1, 12, 8);
const leftEar = new THREE.Mesh(earGeo, headMaterial);
leftEar.position.set(-0.72, 0.05, 0.05);
leftEar.scale.set(0.35, 0.8, 0.6);
headGroup.add(leftEar);

const rightEar = leftEar.clone();
rightEar.position.set(0.72, 0.05, 0.05);
headGroup.add(rightEar);

// Neck
const neckGeo = new THREE.CylinderGeometry(0.28, 0.32, 0.6, 16);
const neck = new THREE.Mesh(neckGeo, headMaterial);
neck.position.set(0, -1.1, 0.05);
headGroup.add(neck);

// Shoulders hint
const shoulderGeo = new THREE.CylinderGeometry(0.8, 0.9, 0.3, 16);
const shoulders = new THREE.Mesh(shoulderGeo, headMaterial);
shoulders.position.set(0, -1.55, -0.05);
shoulders.scale.set(1, 1, 0.6);
headGroup.add(shoulders);

// Panel lines on head (subtle geometric detail)
const linesMat = new THREE.MeshStandardMaterial({
    color: 0x080810,
    roughness: 0.9,
    metalness: 0.5,
});

// Center line
const centerLineGeo = new THREE.BoxGeometry(0.008, 1.8, 0.008);
const centerLine = new THREE.Mesh(centerLineGeo, linesMat);
centerLine.position.set(0, 0.05, 0.76);
headGroup.add(centerLine);

// Side panel lines
for (let side of [-1, 1]) {
    const sideLineGeo = new THREE.BoxGeometry(0.006, 1.2, 0.006);
    const sideLine = new THREE.Mesh(sideLineGeo, linesMat);
    sideLine.position.set(side * 0.35, 0.1, 0.6);
    sideLine.rotation.z = side * 0.08;
    headGroup.add(sideLine);
}

// Position the head group
headGroup.position.y = 0.3;
scene.add(headGroup);

// Mouse tracking
let mouseX = 0, mouseY = 0;
let targetRotY = 0, targetRotX = 0;

window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

// Auto-rotate when no mouse movement
let lastMouseMove = 0;
let autoRotateAngle = 0;

window.addEventListener('mousemove', () => {
    lastMouseMove = Date.now();
});

// Resize handler
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    const timeSinceMouseMove = Date.now() - lastMouseMove;

    if (timeSinceMouseMove > 2000) {
        // Auto-rotate slowly
        autoRotateAngle += 0.003;
        targetRotY = Math.sin(autoRotateAngle) * 0.4;
        targetRotX = Math.sin(autoRotateAngle * 0.7) * 0.1;
    } else {
        targetRotY = mouseX * 0.5;
        targetRotX = mouseY * 0.2;
    }

    headGroup.rotation.y += (targetRotY - headGroup.rotation.y) * 0.04;
    headGroup.rotation.x += (targetRotX - headGroup.rotation.x) * 0.04;

    // Subtle breathing effect on visor glow
    const time = Date.now() * 0.001;
    const pulse = 0.8 + Math.sin(time * 1.5) * 0.2;
    visorLight.intensity = 2.5 * pulse;
    glowMat.opacity = 0.15 * pulse;
    haloMat.opacity = 0.06 * pulse;
    visorMaterial.emissiveIntensity = 2.5 * pulse;

    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
