<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3D AI Head</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: transparent;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─── Scene Setup ───
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0.1, 3.8);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
renderer.setClearColor(0x000000, 0);
document.body.appendChild(renderer.domElement);

// ─── Post-Processing ───
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.6,   // strength
    0.4,   // radius
    0.7    // threshold
);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

// ─── Lighting ───
const ambientLight = new THREE.AmbientLight(0x0a0a18, 0.5);
scene.add(ambientLight);

// Key light - top right front
const keyLight = new THREE.DirectionalLight(0x8899bb, 1.5);
keyLight.position.set(3, 4, 4);
scene.add(keyLight);

// Left rim light - cyan-green
const rimLeft = new THREE.DirectionalLight(0x00ccaa, 1.8);
rimLeft.position.set(-4, 1, -2);
scene.add(rimLeft);

// Right rim light - deep blue
const rimRight = new THREE.DirectionalLight(0x004466, 1.2);
rimRight.position.set(4, 0, -3);
scene.add(rimRight);

// Top spotlight
const topSpot = new THREE.SpotLight(0x6688aa, 2.0, 15, 0.4, 0.8);
topSpot.position.set(0, 6, 2);
topSpot.target.position.set(0, 0, 0);
scene.add(topSpot);
scene.add(topSpot.target);

// Eye glow lights
const eyeLight = new THREE.PointLight(0x66ffee, 2.0, 4);
eyeLight.position.set(0, 0.3, 1.2);
scene.add(eyeLight);

const eyeLight2 = new THREE.PointLight(0x44ddcc, 0.8, 2);
eyeLight2.position.set(0, 0.3, 0.8);
scene.add(eyeLight2);

// Under-chin fill
const chinFill = new THREE.PointLight(0x001122, 0.5, 3);
chinFill.position.set(0, -1, 0.5);
scene.add(chinFill);

// ─── Procedural Environment Map ───
const pmremGenerator = new THREE.PMREMGenerator(renderer);
const envScene = new THREE.Scene();
envScene.background = new THREE.Color(0x000508);
const envLight1 = new THREE.PointLight(0x00ccaa, 15, 100);
envLight1.position.set(-5, 3, -5);
envScene.add(envLight1);
const envLight2 = new THREE.PointLight(0x004488, 10, 100);
envLight2.position.set(5, -2, 5);
envScene.add(envLight2);
const envLight3 = new THREE.PointLight(0x66ffee, 8, 100);
envLight3.position.set(0, 5, 0);
envScene.add(envLight3);
const envTexture = pmremGenerator.fromScene(envScene, 0.04).texture;
pmremGenerator.dispose();

// ─── Black Head Material with Custom Shader ───
const headMaterial = new THREE.MeshPhysicalMaterial({
    color: 0x080810,
    roughness: 0.3,
    metalness: 0.95,
    clearcoat: 0.4,
    clearcoatRoughness: 0.3,
    envMap: envTexture,
    envMapIntensity: 0.6,
});

let headShaderRef = null;
headMaterial.onBeforeCompile = (shader) => {
    shader.uniforms.uTime = { value: 0 };

    shader.fragmentShader = shader.fragmentShader.replace(
        'void main() {',
        `
        uniform float uTime;

        vec2 hexGrid(vec2 p) {
            vec2 h = vec2(1.0, 1.732);
            vec2 a = mod(p, h) - h * 0.5;
            vec2 b = mod(p - h * 0.5, h) - h * 0.5;
            return dot(a, a) < dot(b, b) ? a : b;
        }

        void main() {
        `
    );

    shader.fragmentShader = shader.fragmentShader.replace(
        '#include <dithering_fragment>',
        `
        // Fresnel rim glow
        vec3 viewDir = normalize(vViewPosition);
        float fresnel = pow(1.0 - abs(dot(viewDir, normal)), 3.0);
        gl_FragColor.rgb += vec3(0.1, 0.9, 0.85) * fresnel * 0.3;

        // Hex pattern overlay
        vec3 wp = vViewPosition * 8.0;
        vec2 hexUV = hexGrid(wp.xy + wp.zz * 0.3);
        float hexLine = 1.0 - smoothstep(0.02, 0.06, length(hexUV));
        float hexPulse = sin(uTime * 2.0 + wp.x * 3.0 + wp.y * 5.0) * 0.5 + 0.5;
        gl_FragColor.rgb += vec3(0.2, 0.8, 0.7) * hexLine * hexPulse * 0.06;

        // Scanning line
        float scanY = mod(uTime * 0.4, 3.5) - 1.5;
        float scanLine = smoothstep(scanY - 0.03, scanY, vViewPosition.y) -
                         smoothstep(scanY, scanY + 0.03, vViewPosition.y);
        gl_FragColor.rgb += vec3(0.3, 1.0, 0.9) * scanLine * 0.4;

        #include <dithering_fragment>
        `
    );

    headShaderRef = shader;
};

// Eye emissive material (for the eye socket interiors)
const eyeEmissiveMat = new THREE.MeshStandardMaterial({
    color: 0x66ffee,
    emissive: 0x44ddcc,
    emissiveIntensity: 1.5,
    roughness: 0.1,
    metalness: 0.5,
});

// ─── Head Group ───
const headGroup = new THREE.Group();
headGroup.position.y = 0.3;
scene.add(headGroup);

// ─── Load GLB Model ───
const loader = new GLTFLoader();
let modelLoaded = false;

loader.load('models-3d/humanoid_robot_face.glb', (gltf) => {
    const model = gltf.scene;

    // Compute bounding box to center and scale the model
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    // Scale to fit ~1.8 units tall (matching our previous head size)
    const targetHeight = 1.8;
    const scale = targetHeight / size.y;
    model.scale.setScalar(scale);

    // Center the model
    model.position.x = -center.x * scale;
    model.position.y = -center.y * scale;
    model.position.z = -center.z * scale;

    // Apply black material to all meshes
    model.traverse((child) => {
        if (child.isMesh) {
            // Check if this might be an eye or emissive part
            const name = (child.name || '').toLowerCase();
            const isEye = name.includes('eye') || name.includes('iris') ||
                          name.includes('pupil') || name.includes('lens');

            if (isEye) {
                // Keep eyes with a glowing cyan material
                child.material = eyeEmissiveMat;
            } else {
                // Apply our custom black material with shader effects
                child.material = headMaterial;
            }
            child.castShadow = true;
            child.receiveShadow = true;
        }
    });

    headGroup.add(model);
    modelLoaded = true;

}, (progress) => {
    // Loading progress
}, (error) => {
    console.error('Error loading model:', error);
});

// ─── Holographic Rings ───
const holoRings = [];
const ringConfigs = [
    { y: 0.5, radius: 0.55, speed: 0.3, phase: 0 },
    { y: 0.15, radius: 0.65, speed: -0.2, phase: 1.5 },
    { y: -0.2, radius: 0.58, speed: 0.25, phase: 3.0 },
    { y: -0.55, radius: 0.45, speed: -0.35, phase: 4.5 },
];

ringConfigs.forEach(cfg => {
    const ringGeo = new THREE.TorusGeometry(cfg.radius, 0.003, 4, 128);
    const ringMat = new THREE.MeshBasicMaterial({
        color: 0x44ddcc,
        transparent: true,
        opacity: 0.06,
        blending: THREE.AdditiveBlending,
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.y = cfg.y;
    ring.rotation.x = Math.PI / 2;
    headGroup.add(ring);
    holoRings.push({ mesh: ring, mat: ringMat, ...cfg });
});

// ─── Particle System ───
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const pPositions = new Float32Array(particleCount * 3);
const pOffsets = new Float32Array(particleCount);
const pSpeeds = new Float32Array(particleCount);
const pRadii = new Float32Array(particleCount);
const pSizes = new Float32Array(particleCount);

for (let i = 0; i < particleCount; i++) {
    const r = 1.1 + Math.random() * 1.4;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);

    pPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    pPositions[i * 3 + 1] = r * Math.cos(phi);
    pPositions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);

    pOffsets[i] = Math.random() * Math.PI * 2;
    pSpeeds[i] = 0.2 + Math.random() * 0.8;
    pRadii[i] = r;
    pSizes[i] = 0.5 + Math.random() * 1.2;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
particleGeo.setAttribute('aOffset', new THREE.BufferAttribute(pOffsets, 1));
particleGeo.setAttribute('aSpeed', new THREE.BufferAttribute(pSpeeds, 1));
particleGeo.setAttribute('aRadius', new THREE.BufferAttribute(pRadii, 1));
particleGeo.setAttribute('aSize', new THREE.BufferAttribute(pSizes, 1));

const particleMat = new THREE.ShaderMaterial({
    uniforms: {
        uTime: { value: 0 },
        uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) },
    },
    vertexShader: `
        attribute float aOffset;
        attribute float aSpeed;
        attribute float aRadius;
        attribute float aSize;

        uniform float uTime;
        uniform float uPixelRatio;

        varying float vAlpha;

        void main() {
            float angle = uTime * aSpeed + aOffset;
            vec3 p = position;

            float cosA = cos(angle);
            float sinA = sin(angle);
            vec3 orbited = vec3(
                p.x * cosA - p.z * sinA,
                p.y + sin(uTime * aSpeed * 0.5 + aOffset) * 0.1,
                p.x * sinA + p.z * cosA
            );

            vec4 mvPos = modelViewMatrix * vec4(orbited, 1.0);
            gl_Position = projectionMatrix * mvPos;
            gl_PointSize = aSize * uPixelRatio * (80.0 / -mvPos.z);

            vAlpha = 0.15 + sin(uTime * 2.0 + aOffset) * 0.1;
        }
    `,
    fragmentShader: `
        varying float vAlpha;

        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;

            float alpha = smoothstep(0.5, 0.1, dist) * vAlpha;
            vec3 color = mix(vec3(0.3, 1.0, 0.9), vec3(1.0), smoothstep(0.3, 0.0, dist));

            gl_FragColor = vec4(color, alpha);
        }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
});

const particles = new THREE.Points(particleGeo, particleMat);
headGroup.add(particles);

// ─── Mouse Tracking ───
let mouseX = 0, mouseY = 0;
let targetRotY = 0, targetRotX = 0, targetRotZ = 0;
let lastMouseMove = 0;
let autoRotateAngle = 0;

window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
    lastMouseMove = Date.now();
});

window.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
        mouseX = (e.touches[0].clientX / window.innerWidth - 0.5) * 2;
        mouseY = (e.touches[0].clientY / window.innerHeight - 0.5) * 2;
        lastMouseMove = Date.now();
    }
}, { passive: true });

// ─── Resize ───
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
    particleMat.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
});

// ─── Animation Loop ───
function animate() {
    requestAnimationFrame(animate);
    const time = performance.now() * 0.001;
    const timeSinceMouseMove = Date.now() - lastMouseMove;

    // Head tracking with tilt
    if (timeSinceMouseMove > 2000) {
        autoRotateAngle += 0.003;
        targetRotY = Math.sin(autoRotateAngle) * 0.4;
        targetRotX = Math.sin(autoRotateAngle * 0.7) * 0.1;
        targetRotZ = Math.sin(autoRotateAngle * 0.5) * 0.03;
    } else {
        targetRotY = mouseX * 0.7;
        targetRotX = mouseY * 0.35;
        targetRotZ = -mouseX * 0.12;
    }

    // Faster lerp for snappier response
    const lerpRate = 0.08;

    headGroup.rotation.y += (targetRotY - headGroup.rotation.y) * lerpRate;
    headGroup.rotation.x += (targetRotX - headGroup.rotation.x) * lerpRate;
    headGroup.rotation.z += (targetRotZ - headGroup.rotation.z) * lerpRate;

    // Micro-movements when idle
    headGroup.rotation.y += Math.sin(time * 3.7) * 0.002;
    headGroup.rotation.x += Math.cos(time * 2.9) * 0.001;

    // Floating/bobbing
    headGroup.position.y = 0.3 + Math.sin(time * 0.8) * 0.025;
    headGroup.position.z = Math.sin(time * 0.6) * 0.008;

    // Eye glow pulse
    const pulse = 0.85 + Math.sin(time * 1.5) * 0.15;
    eyeLight.intensity = 1.5 * pulse;
    eyeLight2.intensity = 0.6 * pulse;
    eyeEmissiveMat.emissiveIntensity = 1.5 * pulse;

    // Holographic ring animation
    holoRings.forEach(ring => {
        ring.mesh.rotation.z += ring.speed * 0.01;
        ring.mat.opacity = 0.04 + Math.sin(time * Math.abs(ring.speed) * 3 + ring.phase) * 0.03;
    });

    // Update particle shader uniform
    particleMat.uniforms.uTime.value = time;

    // Update head shader uniform
    if (headShaderRef) {
        headShaderRef.uniforms.uTime.value = time;
    }

    // Render with post-processing
    composer.render();
}

animate();
</script>
</body>
</html>
